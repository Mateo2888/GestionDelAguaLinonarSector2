name: Mantener despierto Supabase

on:
  schedule:
    # Corre cada 3 días a las 8:00 UTC — suficiente para evitar la pausa por inactividad (7 días)
    - cron: '0 8 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar Supabase para mantenerlo activo
        run: |
          curl -s -X GET \
            "https://owhtiqoshemfchrsvsib.supabase.co/rest/v1/programacion?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
